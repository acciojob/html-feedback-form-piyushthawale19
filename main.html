<!DOCTYPE html>

<html>

<head>

<body>

		<input id="likeness" type="range" name="likeness" minlength="1" maxlength="100">
	    <br><br>
		
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
